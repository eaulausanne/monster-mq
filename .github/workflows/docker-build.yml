name: Build and Push Docker Image

on:
  schedule:
    # Check for new upstream tags every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new tag'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/vogler75/monster-mq.git || true
          git fetch upstream --tags
          git fetch origin --tags

      - name: Check for new tags
        id: check_tag
        run: |
          # Get the latest upstream tag (sorted by version)
          LATEST_TAG=$(git tag --sort=-version:refname | head -1)
          echo "Latest upstream tag: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Check if we already built this tag (marker tag in our repo)
          BUILT_TAG=$(git tag -l "built-$LATEST_TAG" 2>/dev/null || true)

          if [ -n "$BUILT_TAG" ] && [ "${{ github.event.inputs.force_build }}" != "true" ]; then
            echo "Tag $LATEST_TAG already built (marker: $BUILT_TAG). Skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New tag $LATEST_TAG detected. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          # Extract clean version (strip 'v' prefix)
          VERSION="${LATEST_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Merge upstream main
        if: steps.check_tag.outputs.should_build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit || true
          git push origin main || true

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-platform builds
        if: steps.check_tag.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        if: steps.check_tag.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push multi-platform image
        if: steps.check_tag.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            eauservice/monstermq:latest
            eauservice/monstermq:${{ steps.check_tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mark tag as built
        if: steps.check_tag.outputs.should_build == 'true'
        run: |
          git tag "built-${{ steps.check_tag.outputs.latest_tag }}"
          git push origin "built-${{ steps.check_tag.outputs.latest_tag }}"
