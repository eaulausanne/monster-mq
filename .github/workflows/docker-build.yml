name: Build and Push Docker Image

on:
  schedule:
    # Check for upstream changes every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new version'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/vogler75/monster-mq.git || true
          git fetch upstream main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit || true
          git push origin main || true

      - name: Check for new version
        id: check_version
        run: |
          # Read version from upstream version.txt
          UPSTREAM_VERSION=$(git show upstream/main:version.txt | cut -d'+' -f1)
          echo "Upstream version: $UPSTREAM_VERSION"
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

          # Check if we already built this version (marker tag in our repo)
          git fetch origin --tags
          BUILT_TAG=$(git tag -l "built-v$UPSTREAM_VERSION" 2>/dev/null || true)

          if [ -n "$BUILT_TAG" ] && [ "${{ github.event.inputs.force_build }}" != "true" ]; then
            echo "Version $UPSTREAM_VERSION already built (marker: $BUILT_TAG). Skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version $UPSTREAM_VERSION detected. Building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-platform builds
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push multi-platform image
        if: steps.check_version.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            eauservice/monstermq:latest
            eauservice/monstermq:${{ steps.check_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mark version as built
        if: steps.check_version.outputs.should_build == 'true'
        run: |
          git tag "built-v${{ steps.check_version.outputs.version }}"
          git push origin "built-v${{ steps.check_version.outputs.version }}"
